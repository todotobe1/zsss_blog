baseURL = "/"
languageCode = "zh-cn"
title = "zsss 的技术博客"
theme = "PaperMod"
enableRobotsTXT = true

[pagination]
  pagerSize = 10
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
disableXML = true
minifyOutput = true

[params]
  env = "production"
  title = "zsss"
  description = "关注 AI Coding、具身智能与独立开发"
  keywords = ["AI", "Hugo", "独立开发", "AI Coding", "具身智能"]
  author = "zsss"
  # profileMode 开启主页人物卡片
  [params.profileMode]
    enabled = true
    title = "zsss"
    subtitle = "关注 AI Coding · 具身智能 · 独立开发"
    imageUrl = "avatar.png"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "zsss"
    [[params.profileMode.buttons]]
      name = "文章"
      url = "/posts"
    [[params.profileMode.buttons]]
      name = "标签"
      url = "/tags"

  [params.homeInfoParams]
    Title = "欢迎来到 zsss 的博客 👋"
    Content = "关注 AI Coding、具身智能与独立开发，记录技术探索与思考。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/zsss"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/zsss"

  [params.analytics.google]
    SiteVerificationTag = ""

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.editPost]
    URL = "https://github.com/zsss/zsss_blog/tree/main/content"
    Text = "建议修改"
    appendFilePath = true

  showToc = true
  TocOpen = false
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    anchorLineNos = true
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 40
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 50
